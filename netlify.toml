[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/index-v4.html"
  status = 200
  force = true

[[redirects]]
  from = "/produkte/cashback"
  to = "/cashback.html"
  status = 200

[[redirects]]
  from = "/produkte/shop"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/produkte/web-to-publish"
  to = "/web-to-publish.html"
  status = 200

[[redirects]]
  from = "/produkte/app"
  to = "/3dcay-app.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/referenzen"
  to = "/referenzen.html"
  status = 200

[[redirects]]
  from = "/assessment"
  to = "/assessment.html"
  status = 200

[[redirects]]
  from = "/whitepaper"
  to = "/whitepaper.html"
  status = 200

[[redirects]]
  from = "/newsletter"
  to = "/ki-lab-newsletter.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
